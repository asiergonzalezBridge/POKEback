services:
  db:
    image: postgres:latest
    container_name: pokemon_db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - ${DB_PORT}:5432
    volumes:
       - ./db/data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - postgres-network
      
networks:
  postgres-network:
    external: true